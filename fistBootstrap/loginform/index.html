<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=div, initial-scale=1.0" />
    <title>BootStrap-Login</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>

  <body class="bg-primary">
    <div
      class="container-fluid d-flex justify-content-center align-items-center vh-100 bg-primary gap-5"
    >
      <div
        class="d-flex gap-5 w-100 justify-content-center align-items-end text-secondary"
      >
        <!-- LOGIN -->

        <div
          class="col-4 bg-white text-black p-5 rounded-3 h-75 d-flex align-items-center"
        >
          <div class="w-100 d-flex flex-column gap-3">
            <h1><u class="link-underline-primary">Lo</u>gin</h1>

            <div
              class="border-bottom border-secondary p-2 d-flex gap-2 input-group"
            >
              <i class="bi bi-envelope fs- pt-2 "></i>
              <input
                type="email"
                class="form-control border-0 input-group"
                placeholder="Enter Your Email"
              />
            </div>

            <div class="border-bottom border-secondary p-2 d-flex gap-2">
              <i class="bi bi-lock fs-5 pt-1"></i>
              <input
                type="password"
                class="form-control border-0 input-group"
                placeholder="Enter Your password"
              />
              <i class="bi bi-eye d-flex align-items-center fs-5"></i>
            </div>

            <div class="d-flex justify-content-between">
              <div>
                <input type="checkbox" />
                <span>Remember me</span>
              </div>
              <a href="#" class="text-decoration-none">Forgot password</a>
            </div>

            <button class="btn btn-primary">Login now</button>
            <div class="d-flex justify-content-center gap-2">
              <span>Don't have an account ?</span>
              <a href="#" class="text-decoration-none">Sign now</a>
            </div>
          </div>
        </div>

        <!-- REGISTRATION -->

        <div
          class="col-4 bg-white text-black p-5 rounded-3 h-75 d-flex align-items-center"
        >
          <div class="w-100 d-flex flex-column gap-3">
            <h1><u class="link-underline-primary">Reg</u>ister</h1>

            <div class="border-bottom border-secondary p-2 d-flex gap-3">
              <i class="bi bi-person fs-5 pt-2"></i>
              <input
                type="text"
                class="form-control border-0"
                placeholder="Enter Your name"
              />
            </div>

            <div class="border-bottom border-secondary p-2 d-flex gap-3">
              <i class="bi bi-envelope fs-5 pt-2"></i>
              <input
                type="email"
                class="form-control border-0"
                placeholder="Enter Your Email"
              />
            </div>

            <div class="border-bottom border-secondary p-2 d-flex gap-2">
              <i class="bi bi-lock fs-5 pt-2"></i>
              <input
                type="password"
                class="form-control border-0 input-group"
                placeholder="Create Your password"
              />
              <i class="bi bi-eye d-flex align-items-center fs-5"></i>
            </div>

            <div class="border-bottom border-secondary p-2 d-flex gap-2">
              <i class="bi bi-lock fs-5 pt-2"></i>
              <input
                type="password"
                class="form-control border-0 input-group"
                placeholder="Confirm Your password"
              />
              <i class="bi bi-eye d-flex align-items-center fs-5"></i>
            </div>

            <div class="d-flex justify-content-between">
              <div>
                <input type="checkbox" />
                <span>I accept all terms & conditions</span>
              </div>
            </div>

            <button class="btn btn-primary">Register now</button>
            <div class="d-flex justify-content-center gap-2">
              <span>Already have an account ?</span>
              <a href="#" class="text-decoration-none">Login now</a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- BootStrap-Script -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
