<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Age Calculator</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <div class="w-25 bg-light rounded shadow border mx-auto mt-5">
      <h2 class="text-center">Age Calculator</h2>
      <form class="d-grid gap-3 justify-content-center">
        <label for="DOB" class="text-center">Enter your Date of Birth</label>
        <input type="date" name="DOB" id="DOB" class="form-control" />
        <label for="currentDate">Chose Current Date of Birth</label>
        <input
          type="date"
          name="currentDate"
          id="currentDate"
          class="form-control"
        />
        <button type="submit" class="btn btn-primary">Calculate Age</button>
      </form>
      <div class="fw-bold text-center">
        Your Age:<span id="myAge"></span>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
