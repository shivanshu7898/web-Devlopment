<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      width: min(400px, 100%);
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    h2 {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 20px;
    }
    .search-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      color: #333;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #4a90d9; }
    input::placeholder { color: #aaa; }
    button {
      background: #4a90d9;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    button:hover { background: #3578c4; }
    button:disabled { background: #94b8e0; cursor: not-allowed; }

    .error {
      background: #fff3f3;
      border: 1px solid #f5c6c6;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #c0392b;
      margin-bottom: 16px;
      display: none;
    }

    .weather {
      display: none;
      animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .weather-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .city { font-size: 22px; font-weight: 700; color: #1a1a2e; }
    .desc { font-size: 14px; color: #888; margin-top: 2px; text-transform: capitalize; }
    .icon { font-size: 52px; }

    .temp-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 20px;
    }
    .temp { font-size: 56px; font-weight: 700; color: #1a1a2e; line-height: 1; }
    .unit-toggle { display: flex; gap: 4px; margin-left: 4px; }
    .ubtn {
      background: transparent;
      border: 1.5px solid #ddd;
      border-radius: 6px;
      padding: 4px 9px;
      font-size: 13px;
      color: #888;
      cursor: pointer;
      transition: all 0.2s;
    }
    .ubtn.active { background: #eef5ff; border-color: #4a90d9; color: #4a90d9; }
    .ubtn:hover:not(.active) { border-color: #bbb; }

    .divider { height: 1px; background: #f0f0f0; margin-bottom: 16px; }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .stat {
      background: #f8fafc;
      border-radius: 10px;
      padding: 12px 14px;
    }
   
    .stat-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px; }
    .stat-val { font-size: 16px; font-weight: 600; color: #333; }
  </style>
</head>
<body style="background-image: url(./paper-cut-rain-clouds-water-drops-and-lightning-vector.jpg);">
   
<div class="card">
    
  <h2>🌤 Weather</h2>

  <div class="search-row">
    <input type="text" id="cityname" placeholder="Sheher ka naam..." autocomplete="off"/>
    <button id="btn" onclick="get()">Dekho</button>
  </div>

  <div class="error" id="errMsg"></div>

  <div class="weather" id="weatherDiv">
    <div class="weather-top">
      <div>
        <div class="city" id="cityName">—</div>
        <div class="desc" id="desc">—</div>
      </div>
      <div class="icon" id="icon">—</div>
    </div>

    <div class="temp-row">
      <div class="temp" id="Temperature">—</div>
      <div>
        <div class="unit-toggle">
          <button class="ubtn active" id="btnC" onclick="switchUnit('C')">°C</button>
          <button class="ubtn" id="btnF" onclick="switchUnit('F')">°F</button>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">Humidity</div>
        <div class="stat-val" id="humidity">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Wind</div>
        <div class="stat-val" id="wind">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Feels Like</div>
        <div class="stat-val" id="feels">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Visibility</div>
        <div class="stat-val" id="visibility">—</div>
      </div>
    </div>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
