<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="Style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <section class="pic">
      <div class="container d-flex justify-content-center">
        <div class="card rounded-4">
          <div class="show m-1 rounded-top-4 text-end"></div>
          <div class="number m-1 mt-0 rounded-bottom-4">
            <button class="btn border rounded-circle ms-4 me-4 m-2 bg-light" onclick="calculate('AC')">
              <h4>AC</h4>
            </button>
            <button class="btn border rounded-circle ms-4 me-4 m-2 bg-light"onclick="calculate('C')">
              <h4>C</h4>
            </button>
            <button class="btn border rounded-circle ms-4 me-4 m-2 bg-light"onclick="calculate('%')">
              <h4>%</h4>
            </button>
            <button class="btn border rounded-circle ms-4 me-4 m-2 bg-warning"onclick="calculate('/')">
              <h4>/</h4>
            </button>
            <button class="btn border rounded-circle ms-4 me-4 m-2 bg-light"onclick="calculate('7')">
              <h4>7</h4>
            </button>
            <button class="btn border rounded-circle ms-4 me-4 m-2 bg-light"onclick="calculate('8')">
              <h4>8</h4>
            </button>
            <button class="btn border rounded-circle ms-4 me-4 m-2 bg-light"onclick="calculate('9')">
              <h4>9</h4>
            </button>
            <button class="btn border rounded-circle ms-4 me-4 m-2 bg-warning"onclick="calculate('*')">
              <h4>*</h4>
            </button>
            <button class="btn border rounded-circle ms-4 me-4 m-2 bg-light"onclick="calculate('4')">
              <h4>4</h4>
            </button>
            <button class="btn border rounded-circle ms-4 me-4 m-2 bg-light"onclick="calculate('5')">
              <h4>5</h4>
            </button>
            <button class="btn border rounded-circle ms-4 me-4 m-2 bg-light"onclick="calculate('6')">
              <h4>6</h4>
            </button>
            <button class="btn border rounded-circle ms-4 me-4 m-2 bg-warning"onclick="calculate('-')">
              <h4>-</h4>
            </button>
            <button class="btn border rounded-circle ms-4 me-4 m-2 bg-light"onclick="calculate('1')">
              <h4>1</h4>
            </button>
            <button class="btn border rounded-circle ms-4 me-4 m-2 bg-light"onclick="calculate('2')">
              <h4>2</h4>
            </button>
            <button class="btn border rounded-circle ms-4 me-4 m-2 bg-light"onclick="calculate('3')">
              <h4>3</h4>
            </button>
            <button class="btn border rounded-circle ms-4 me-4 m-2 bg-warning"onclick="calculate('+')">
              <h4>+</h4>
            </button>
            <button class="btn border rounded-circle ms-4 me-4 m-2 bg-light"onclick="calculate('0')">
              <h4>0</h4>
            </button>
            <button class="btn border rounded-circle ms-4 me-4 m-2 bg-light"onclick="calculate('.')">
              <h4>.</h4>
            </button>
            <button class="btn border rounded-circle ms-4 me-4 m-2 bg-success"onclick="calculate('=')">
              <h4>=</h4>
            </button>
          </div>
        </div>
      </div>
    </section>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <script src="Script.js"></script>
  </body>
</html>
