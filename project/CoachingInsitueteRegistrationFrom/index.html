<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div
      class="text-center bg-danger text-white p-3 position-sticky top-0 shadow"
    >
      <h1>Coaching Institute Registration Form</h1>
    </div>
    <div
      class="container p-3 mt-3 mb-3 border border-1 rounded-2 bg-light shadow"
    >
      <form>
        <div class="border border-1 p-3 rounded-3 bg-white">
          <h3 class="fw-bolder">personal details</h3>

          <label for="fullName">Name</label>
          <input
            class="form-control m-1"
            type="text"
            id="fullName"
            placeholder="Enter a Full Name"
            required
          />
          <div>
            <div id="nameerror" class="text-danger ps-2"></div>
          </div>

          <label for="Email">Email</label>
          <input
            class="form-control m-1"
            type="email"
            id="Email"
            name="Email"
            placeholder="Enter Email"
            required
          />
          <div>
            <div id="emailError" class="text-danger ps-2"></div>
          </div>

          <label for="MobileNumber">Mobile Number</label>
          <input
            class="form-control m-1"
            type="number"
            id="MobileNumber"
            name="MobileNumber"
            placeholder="Enter your Mobile Number"
            required
          />
           <div>
            <div id="mobileError" class="text-danger ps-2"></div>
          </div>

          <label for="DOB">DOB</label>
          <input
            class="form-control m-1"
            type="date"
            id="DOB"
            name="DOB"
            placeholder="Date of Birth"
          />
        </div>

        <div
          class="AcademicDetails border border-1 p-3 mt-4 rounded-3 bg-white"
        >
          <h3 class="mt-3">Academic Details</h3>
          <div class="m-2">
            <label for="Qualification"> Last Completed Qualification:</label>
            <select
              name="Qualification"
              id="Qualification"
              class="form-control"
              required
            >
             
              <option value="10th">10th pass</option>
              <option value="10th">12th pass</option>
              <option value="Graduation">Graduation</option>
              <option value="Postgraduate">Postgraduate</option>
            </select>
          </div>
          <div class="m-2">
            <label for="Grade">Percentage/Grade in Last Qualification: </label>
            <input
              type="text"
              id="Grade"
              name="Grade"
              placeholder="Grade in Last Qualification"
              class="form-control"
              required
            />
            <div>
            <div id="gradeError" class="text-danger ps-2"></div>
          </div>
          </div>
        </div>
        <div class="Course border border-1 p-3 mt-4 rounded-3 bg-white">
          <h3 class="mt-3">Course Information</h3>
          <div class="m-2">
            <label for="PreferredCourse">Preferred Course:</label>
            <select
              name="PreferredCourse"
              id="PreferredCourse"
              class="form-control"
              required
            >
              <option value="NEET">NEET</option>
              <option value="IIT-JEE">IIT-JEE</option>
              <option value="Banking">Banking</option>
              <option value="UPSC">UPSC</option>
            </select>
          </div>
          <div class="m-2">
            <p>Batch Timing Preference:</p>

            <div>
              <input type="checkbox" id="morning" />
              <label for="morning">Morning</label>

              <input type="checkbox" id="afternoon" />
              <label for="afternoon">Afternoon</label>

              <input type="checkbox" id="evening" />
              <label for="evening">Evening</label>

              <input type="checkbox" id="weekend" />
              <label for="weekend">Weekend</label>
            </div>
          </div>
        </div>
         <div class="Adrees border border-1 p-3 mt-4 rounded-3 bg-white">
          <h3 class="mt-3">Address</h3>
            <label for="address"></label>
            <textarea
              class="s1 form-control"
              id="address"
              rows="3"
              placeholder="Enter Your fulll Address..."
            ></textarea>
          </div>
        <div class="GuardianName border border-1 p-3 mt-4 rounded-3 bg-white">
          <h3 class="mt-3">Guardian’s Details</h3>
          <div>
            <label for="gname">Guardian’s Full Name:</label>
            <input
              class="form-control"
              type="text"
              id="gname"
              placeholder="Full Name"
              required
            />
             <div>
            <div id="gError" class="text-danger ps-2"></div>
          </div>

          </div>

          <div>
            <label for="number"> Guardian’s Contact Number:</label>
            <input
              class="form-control"
              type="number"
              id="number"
              placeholder="Contact Number"
              required
            />
            <div>
            <div id="gmError" class="text-danger ps-2"></div>
          </div>
          </div>
        </div>
        <div class="aboutus border border-1 p-3 mt-4 rounded-3 bg-white">
          <h3 class="mt-3">Additional Information:-</h3>

          <div>
            <label for="source">How did you hear about us? </label>
            <select class="form-control" id="source">
              <option value="select">Select</option>
              <option value="Friends">Friends</option>
              <option value="Online Ad">Online Ad</option>
              <option value="Newspaper">Newspaper</option>
              <option value="Social Media">Social Media</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div>
            <label for="specialReq">Special Requirements (Optional) </label>
            <textarea
              class="s1 form-control"
              id="sourceReq"
              rows="3"
              placeholder="Specify any additional needs..."
            ></textarea>
          </div>
          <div>
            <button class="btn btn-danger" type="button" onclick="formSubmit()">
              Submit
            </button>
            <button class="btn btn-light" type="reset" onclick="formReset()">
              Reset
            </button>
          </div>
        </div>
      </form>
    </div>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <script src="script.js"></script>
  </body>
</html>
