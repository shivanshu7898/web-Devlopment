<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Electricity Bill Calculator</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-5">
          <h2 class="text-center mb-4"> Electricity Bill Calculator</h2>

          <div class="card shadow-sm mb-4">
            <div class="card-body">
              <label for="units" class="form-label fw-bold"
                >Enter Units Consumed (kWh):</label
              >
              <input
                type="number"
                id="units"
                class="form-control"
                placeholder="e.g. 350"
                min="1"
              />
              <div id="error-msg" class="text-danger mt-1"></div>
              <div class="d-flex gap-2 mt-3">
                <button class="btn btn-success w-100" onclick="calculate()">
                  Calculate
                </button>
                <button class="btn btn-secondary w-100" onclick="resetAll()">
                  Reset / Clear
                </button>
              </div>
            </div>
          </div>

          <div id="result-section">
            <div class="card shadow-sm">
              <div class="card-header fw-bold">
                Bill
              </div>
              <div class="card-body" id="bill-body"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
