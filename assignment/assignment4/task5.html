<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
         <div>
            <legend><b>Application Form</b></legend>
            <br />
            <label for="fullName"> First Name :</label>
            <input
              type="texts"
              id="fullName"
              name="fullName"
              placeholder="Enter your FirstName"
            />
         
            <label for="lastName"> Last Name:</label>
            <input
              type="text"
              id="lastName"
              name="lastName"
              placeholder="Enter your LastName"
            />
          </div>
          <br>
           <div>
            <label for="Date of Birth"> Date of Birth :</label>
            <input
              type="date"
              id="Date of Birth"
              name="Date of Birth"
             
            />
             <label for="Age"> Age :</label>
            <input
              type="number"
              id="Age"
              name="Age"
              placeholder="Enter your Age"
            />
          </div>
          <br>
           <div>
            <section>
              <label for="Gender"> Gender :</label>
              <select id="Gender" name="Gender">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
              </select>
              <label for="Email Address"> Email Address :</label>
            <input
              type="email"
              id="Email Address"
              name="Email Address"
              placeholder="Enter your Email Address"
            />
            </section>
            </div>
            <br>
             <div>
            <div>
                <label for="position Available"> positions Available :</label>
                <input type="radio" id="position Available" name="position Available" value="position Available">
                <label for="position Available"> junior Developer</label>

                <input type="radio" id="position Available" name="position Available" value="position Available">
                <label for="position Available"> senior Developer</label>

                <input type="radio" id="position Available" name="position Available" value="position Available">
                <label for="position Available"> Mid-level-Developer</label>
            </div>
            <br>
        <div>

             <label for="position Available"> Programming Languages :</label>
                <input type="checkbox" id="position Available" name="position Available" value="position Available">
                <label for="position Available"> java</label>

                <input type="checkbox" id="position Available" name="position Available" value="position Available">
                <label for="position Available"> javaScript</label>

                <input type="checkbox" id="position Available" name="position Available" value="position Available">
                <label for="position Available"> Python</label>
        </div>
            <br>
            <div>
      <label for="password"> Password :</label>
      <input
        type="password"
        id="password"
        name="password"
        placeholder="Enter your Password"
      />
   
      <label for="confirmPassword"> Confirm Password :</label>
      <input
        type="password"
        id="confirmPassword"
        name="confirmPassword"
        placeholder="Confirm your Password"
      />
    </div>
    <br>
     <div>
            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
          </div>
          
    </form>
    
</body>
</html>
