<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Document</title>
  </head>
  <body>
    <form action="">
      
       <fieldset>
         <legend><b>User input From</b></legend>
        <br />
        <label for="fullName">Name :</label>
        <input
          type="texts"
          id="fullName"
          name="fullName"
          placeholder="Enter your FirstName"
        />
        </div>
        <br />
        <br>

        <div>
        <label for="password">Password :</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter your password"
        />
      </div>
      <br />
      <div>
        <label for="Gender"> Gender :</label>

        <input type="radio" id="male" name="Gender" value="Male" />

      </div>
      <br />
      <div>
        <label for="age"> age :</label>

        <select>
          id="age" name="age">
          <option value="age">Select Age</option>
          <option value="age">< 1 years old</option>
          <option value="age">< 10 years old</option>
        </select>
      </div>
       </fieldset>

       
       <fieldset>


        <legend><b>Languages</b></legend>
       
        <input
          type="checkbox"
          id="Languages"
          name="Languages"
          value="HTML"
        />

        <input
          type="checkbox"
          id="Languages"
          name="Languages"
          value="C/C++"
        />
        <label for="Languages"> C/C++</label>
        
        <input
          type="checkbox"
          id="Languages"
          name="Languages"
          value="C#"
        />
        <label for="Languages"> C#</label>




       </fieldset>
       <fieldset>
        <legend><b>Instruction</b></legend>
        <textarea name="text" placeholder="Enter your instructions here..." id=""></textarea>
       </fieldset>
       <div>

        <button type="clear">Clear</button>
       </div>
    </form>

</html>
