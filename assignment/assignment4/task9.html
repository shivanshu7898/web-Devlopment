<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="">
      <fieldset>
        <caption>
          <b>Farewell Party Survey From</b>
        </caption>
        <br />
        <br />

        <div>
          <label for="fullName">Name :</label>
          <input
            type="texts"
            id="fullName"
            name="fullName"
            placeholder="Enter yourName"
          />
        </div>
        <br />
        <div>
          <label for="email">Email :</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
          />
        </div>
        <br />
        <div>
          <label for="Age">Age :</label>
          <input
            type="number"
            id="age"
            name="age"
            placeholder="Enter your age"
          />
        </div>
        <br />
        <div>
          <label for="Student">Which option best describes you?</label>
          <input type="radio" id="student" name="Student" value="Student" />
          <label for="student"> Student</label>
          <input type="radio" id="employee" name="Student" value="Employee" />
          <label for="employee"> Employee</label>
        </div>
        <br />
        <div>
          <label for="party">Will you be attending the farewell party?</label>
          <input type="radio" id="party" name="party" value="Yes" />
          <label for="party"> Yes</label>
          <input type="radio" id="party" name="party" value="No" />
          <label for="party"> No</label>
        </div>
        <br />
        <div>
          <label for="program">What did you like about the program?</label>
          <br />
          <input type="checkbox" id="program" name="program" value="Option1" />
          <label for="program"> Training</label> <br />
          <input type="checkbox" id="program" name="program" value="Option2" />
          <label for="program">
            The Learning Session from industry experts
          </label>
          <br />
          <input type="checkbox" id="program" name="program" value="Option3" />
          <label for="program"> Community Meetups</label> <br />
          <input type="checkbox" id="program" name="program" value="Option3" />
          <label for="program"> Brown Bag Sessions</label> <br />
          <input type="checkbox" id="program" name="program" value="Option3" />
          <label for="program"> Switching to Hybrid Mode</label> <br />
          <input type="checkbox" id="program" name="program" value="Option3" />
          <label for="program"> Food ,Office etc.</label>
        </div>
        <br />
        <div>
          <label for="suggestions"> any comments or suggestions </label>
          <textarea
            id="suggestions"
            name="suggestions"
            rows="4"
            cols="50"
            placeholder="Enter your suggestions here..."
          ></textarea>
        </div>
        <br />
        <div>
          <button type="submit">Submit</button>
          <button type="reset">Reset</button>
        </div>
      </fieldset>
    </form>
  </body>
</html>
