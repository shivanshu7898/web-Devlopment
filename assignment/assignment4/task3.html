<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="">
      <center>
        <fieldset>
          <div>
            <legend><b>please enter your personal details :</b></legend>
            <br />
            <label for="fullName"> First Name* :</label>
            <input
              type="texts"
              id="fullName"
              name="fullName"
              placeholder="Enter your FirstName"
            />
          </div>
          <br />
          <div>
            <label for="lastName"> Last Name*:</label>
            <input
              type="text"
              id="lastName"
              name="lastName"
              placeholder="Enter your LastName"
            />
          </div>
          <br />
          <div>
            <label for="text"> Street address</label>
            <input
              type="text"
              id="text"
              name="text"
              placeholder="Enter your Street Address"
            />
          </div>
          <br />
          <div>
            <label for="town"> Town/city:</label>
            <input
              type="location"
              id="town"
              name="town"
              placeholder="Enter your Town/City"
            />
          </div>
          <br />
          <div>
            <label for="Postcode/zip"> Postcode/ZIP :</label>
            <input
              type="postcode"
              id="Postcode/zip"
              name="Postcode/zip"
              placeholder="Enter your Postcode/ZIP"
            />
          </div>
          <br />
          <div>
            <label for="Telephone"> Telephone :</label>
            <input
              type="tel"
              id="Telephone"
              name="Telephone"
              placeholder="Enter your Telephone Number"
            />
          </div>
          <br />
          <div>
            <label for="Mobile"> Mobile :</label>
            <input
              type="tel"
              id="Mobile"
              name="Mobile"
              placeholder="Enter your Mobile Number"
            />
          </div>
          <br />
          <div>
            <label for="email"> Email* :</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Enter your Email"
            />
          </div>
          <br />
          <div>
            <caption>
              Fields marked with * are required
            </caption> <br><br>
            <button type="submit">Submit</button>
          </div>
        </fieldset>
      </center>
    </form>
  </body>
</html>
