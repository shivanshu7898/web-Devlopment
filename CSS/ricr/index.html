<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <header></header>
    <main>
      <div>
        <form>
          <div>
            <div id="head">
              <span id="h1"><b>Enquiry Form</b></span>
              <p>
                Have questions or need assistance? Fill out the form below to
                connect with our team and explore your opportunities.
              </p>
            </div>
            <div>
              <label for="fullName"> Person name*:</label>
              <input
                type="texts"
                id="fullName"
                name="fullName"
                placeholder="person name"
              />
            </div>
            <div>
              <label for="contact name"> contact name:</label>
              <input
                type="tel"
                id="contact name"
                name="contact name"
                placeholder="Contact Name"
              />
            </div>
          </div>
          <div>
            <div>
              <label for="Email*"> Email* :</label>
              <input
                type="email"
                id="Email*"
                name="Email*"
                placeholder="Email"
              />
            </div>
            <div>
              <label for="Qualification"> Qualification* :</label>
              <input
                type="text"
                id="Qualification"
                name="Qualification"
                placeholder="Enter your Qualification"
              />
            </div>
          </div>
          <div>
            <label for="college">college/School name* :</label>
            <input
              type="number"
              id="Experience"
              name="Experience"
              placeholder="Enter your Experience in years"
            />
          </div>
          <div>
            <div>
              <label for="year">year*:</label>
              <select id="year" name="year">
                <option value="">Year</option>
                <option value="Fist">Fist year</option>
                <option value="Second">Second year</option>
                <option value="Third">Third year</option>
                <option value="Fourth">Fourth year</option>
                <option value="passout">passout</option>
                <option value="">other</option>
              </select>
            </div>
            <div>
              <label for="Branch">Branch*:</label>
              <input
                type="text"
                id="Branch"
                name="Branch"
                placeholder="Branch"
              />
            </div>
            <div>
              <div>
                <form action="">
                  <h3>Interested in Which Course*</h3>

                  <label>
                    <input
                      type="checkbox"
                      name="course"
                      value="Full Stack Web Development"
                    />
                    Full Stack Web Development - Placement Oriented </label
                  ><br />

                  <label>
                    <input
                      type="checkbox"
                      name="course"
                      value="Data Science with Python"
                    />
                    Data Science with Python - Placement Oriented </label
                  ><br />

                  <label>
                    <input
                      type="checkbox"
                      name="course"
                      value="Data Analytics with Python"
                    />
                    Data Analytics with Python - Placement Oriented </label
                  ><br />

                  <label>
                    <input
                      type="checkbox"
                      name="course"
                      value="Business Analyst"
                    />
                    Business Analyst </label
                  ><br />

                  <label>
                    <input
                      type="checkbox"
                      name="course"
                      value="Java Programming"
                    />
                    Java Programming </label
                  ><br />

                  <label>
                    <input
                      type="checkbox"
                      name="course"
                      value="Python Programming"
                    />
                    Python Programming </label
                  ><br />

                  <label>
                    <input
                      type="checkbox"
                      name="course"
                      value="C/C++ Programming"
                    />
                    C/C++ Programming </label
                  ><br />

                  <label>
                    <input type="checkbox" name="course" value="Other" />
                    Other
                  </label>
                </form>
              </div>
              <div>
                <div>
                  <form action="">
                    <h3>Source of Information*</h3>
                    <p>
                      (Only choose 'Received call from institute' if you
                      actually got a call from us)
                    </p>

                    <select name="source" required>
                      <option value="">-- Select an option --</option>
                      <option value="NewsPaper">NewsPaper/Print Media</option>
                      <option value="Friends">Friends/Relatives</option>
                      <option value="SocialMedia">Social Media</option>
                      <option value="Workshop">Workshop/Seminar</option>
                      <option value="ReceivedCall">
                        Received call from Institute
                      </option>
                      <option value="Other">Other</option>
                    </select>
                  </form>
                </div>
                <div>
                  <form>
                    <h3>Name of Executive*</h3>
                    <select name="executive" required>
                      <option value="">-- Select Executive --</option>
                      <option value="Kasim Khan">Kasim Khan</option>
                      <option value="Anushree Choubey">Anushree Choubey</option>
                      <option value="Sheshram Ahirwar">Sheshram Ahirwar</option>
                      <option value="Shani Mishra">Shani Mishra</option>
                      <option value="Sankalp Shukla">Sankalp Shukla</option>
                      <option value="Deepali Tated">Deepali Tated</option>
                      <option value="Anchal Sejwar">Anchal Sejwar</option>
                    </select>
                  </form>
                </div>
              </div>
            </div>
          </div>
          <div>
            <button type="submit">Submit</button>
          </div>
        </form>
      </div>
    </main>
    <footer></footer>
  </body>
</html>
