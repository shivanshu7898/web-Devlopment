<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <div class="d-flex flex-column gap-4 m-3">
      <input type="text" placeholder="name" id="fullname" class="w-100 me-2" />
      <input type="email" placeholder="email" id="email" class="w-100 me-2" />
      <input
        type="text"
        placeholder="address"
        id="address"
        class="w-100 me-2"
      />
      <input
        type="password"
        placeholder="password"
        id="password"
        class="w-100 me-2"
      />
      <input
        type="password"
        placeholder="confirm password"
        id="confirmPassword"
        class="w-100 me-2"
      />

      <div class="d-flex justify-content-center">
        <div class="btn bg-primary text-light" onclick="submit()">submit</div>
      </div>
    </div>
    <div class="container border shadow rounded divhide" id="cardhide">
      <span>name:</span>
      <span id="mydata"> </span>
      <br>

      <span>email:</span>
      <span id="mydata1"> </span>
      <br>

      <span>address:</span>
      <span id="mydata2"> </span>
      <br>

      <span>Password:</span>
      <span id="mydata3"> </span>
      <br>
      <span>confirmPassword:</span>
      <span id="mydata4"> </span>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
